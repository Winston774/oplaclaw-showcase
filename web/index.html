<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OplacLaw Use Cases</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <div class="logo">
        <span class="logo-icon">🦞</span>
        <div>
          <div class="logo-title">OplacLaw <span class="accent">Use Cases</span></div>
          <div class="logo-sub">由噪噪溫斯頓整理</div>
        </div>
      </div>
    </div>
    <div class="nav-right">
      <span class="result-count" id="nav-count">— RESULTS</span>
      <a href="https://www.youtube.com/@NoiseWinston" target="_blank" class="btn-outline">▶ YouTube</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-left">
      <div class="live-badge">● LIVE DATABASE</div>
      <h1 class="hero-title">
        <span class="accent" id="hero-count">—</span> 個<br>OpenClaw<br>使用案例
      </h1>
      <p class="hero-sub">從 YouTube 所蒐集的 OpenClaw 設定教學與應用案例，複製提示詞就可以直接使用於 OpenClaw、Claude Code、Cursor 或其他 AI agent 工具</p>
    </div>
    <div class="hero-right">
      <canvas id="donut-chart" width="200" height="200"></canvas>
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-num accent" id="stat-total">—</div>
          <div class="stat-label">Use Cases</div>
        </div>
        <div class="stat-card">
          <div class="stat-num accent" id="stat-cats">—</div>
          <div class="stat-label">Categories</div>
        </div>
      </div>
    </div>
  </section>

  <!-- FILTER BAR -->
  <section class="filter-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="搜尋使用案例..." />
    </div>
    <div class="filter-pills" id="filter-pills">
      <!-- injected by JS -->
    </div>
  </section>

  <!-- CARD GRID -->
  <main class="card-grid" id="card-grid">
    <div class="loading">載入中...</div>
  </main>

  <!-- NO RESULTS -->
  <div class="no-results" id="no-results" style="display:none">
    沒有符合的結果
  </div>

  <script src="app.js"></script>
</body>
</html>
